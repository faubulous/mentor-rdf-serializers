name: Test Coverage

on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run coverage tests
        run: npm run test:coverage

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-report
          path: coverage
          if-no-files-found: error

      - name: Upload lcov and json coverage files
        uses: actions/upload-artifact@v4
        with:
          name: coverage-raw-files
          path: |
            coverage/lcov.info
            coverage/coverage-final.json
          if-no-files-found: warn

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false

      - name: Build coverage summary markdown
        id: coverage-summary
        run: |
          node <<'EOF'
          const fs = require('fs');

          const summaryPath = 'coverage/coverage-summary.json';

          if (!fs.existsSync(summaryPath)) {
            const fallback = [
              '## Coverage Summary',
              '',
              'Coverage summary file was not generated. Check test output for details.'
            ].join('\n');
            fs.writeFileSync('coverage-summary.md', fallback);
            process.exit(0);
          }

          const summary = JSON.parse(fs.readFileSync(summaryPath, 'utf8'));
          const total = summary.total || {};

          const rows = [
            ['Lines', total.lines?.pct ?? 'n/a', total.lines?.covered ?? 'n/a', total.lines?.total ?? 'n/a'],
            ['Statements', total.statements?.pct ?? 'n/a', total.statements?.covered ?? 'n/a', total.statements?.total ?? 'n/a'],
            ['Functions', total.functions?.pct ?? 'n/a', total.functions?.covered ?? 'n/a', total.functions?.total ?? 'n/a'],
            ['Branches', total.branches?.pct ?? 'n/a', total.branches?.covered ?? 'n/a', total.branches?.total ?? 'n/a'],
          ];

          const md = [
            '## Coverage Summary',
            '',
            '| Metric | Coverage | Covered | Total |',
            '|---|---:|---:|---:|',
            ...rows.map(([metric, pct, covered, totalCount]) => `| ${metric} | ${pct}% | ${covered} | ${totalCount} |`),
            '',
            '_Generated by Vitest coverage in CI._'
          ].join('\n');

          fs.writeFileSync('coverage-summary.md', md);
          EOF

      - name: Add coverage summary to job output
        run: cat coverage-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Publish sticky PR coverage comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: coverage-summary.md
